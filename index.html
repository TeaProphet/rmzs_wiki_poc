<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="База данных оружия сервера RMZS — Russian Modified Zombie Survival. Характеристики, сравнение и история изменений всего оружия.">
  <title>RMZS Wiki — База оружия</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      visibility: hidden;
      background: #060606;
    }
  </style>
  <script>
    (function() {
      const v = Date.now();

      // Inject style.css
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = 'css/style.css?v=' + v;
      document.head.appendChild(link);

      // Inject app.js
      const script = document.createElement('script');
      script.src = 'js/app.js?v=' + v;
      document.head.appendChild(script);
    })();
  </script>
</head>
<body>

  <header id="header">
    <div class="header-inner">
      <a class="logo" href="#weapons">
        <span class="logo-text">RMZS</span>
        <span class="logo-sub">Weapon Wiki</span>
      </a>
      <nav class="nav-tabs">
        <a class="nav-tab" href="#weapons"   id="tab-weapons">Оружие</a>
        <a class="nav-tab" href="#changelog" id="tab-changelog">Changelog</a>
        <button class="help-btn" id="help-btn">Справка</button>
      </nav>
      <div class="header-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="search" id="search-input" placeholder="Поиск по оружию или ветке…" autocomplete="off">
      </div>
      <!-- Mobile-only search toggle button -->
      <button class="search-toggle-btn" id="search-toggle-btn" aria-label="Поиск">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </header>
  <!-- Mobile search panel (shown below header on mobile) -->
  <div id="mobile-search-panel" class="mobile-search-panel hidden">
    <div class="mobile-search-inner">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="mobile-search-input" placeholder="Поиск по оружию или ветке…" autocomplete="off">
      <button id="mobile-search-close" class="mobile-search-close" aria-label="Закрыть поиск">✕</button>
    </div>
  </div>

  <main id="app">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <p>Загрузка базы данных…</p>
    </div>
  </main>

  <!-- Stat history modal -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title"></div>
          <div class="modal-subtitle" id="modal-subtitle"></div>
        </div>
        <button class="modal-close" id="modal-close-btn" aria-label="Закрыть">&#x2715;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Floating compare widget -->
  <div id="compare-widget" class="compare-widget hidden"></div>

  <!-- app.js is injected dynamically by the script in head -->
</body>
</html>
